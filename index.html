<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔方大全 - CFOP公式·教程·计时器·3D魔方</title>
    <meta name="description" content="三阶魔方CFOP公式大全，包含Cross、F2L、OLL、PLL、ZBLL、ZBLS全部公式（中文表示），还原教程、填色还原、计时器和1~12阶3D互动魔方。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- 顶部标题栏 -->
    <header class="app-header">
        <div class="header-title">
            <span class="cube-icon">🧊</span>
            <h1>魔方大全</h1>
        </div>
    </header>

    <!-- 底部Tab导航 -->
    <nav class="tab-bar">
        <button class="tab-btn active" data-tab="formulas">
            <span class="tab-icon">📖</span>
            <span class="tab-label">公式</span>
        </button>
        <button class="tab-btn" data-tab="tutorial">
            <span class="tab-icon">🎓</span>
            <span class="tab-label">教程</span>
        </button>
        <button class="tab-btn" data-tab="solver">
            <span class="tab-icon">🎨</span>
            <span class="tab-label">还原</span>
        </button>
        <button class="tab-btn" data-tab="timer">
            <span class="tab-icon">⏱️</span>
            <span class="tab-label">计时</span>
        </button>
        <button class="tab-btn" data-tab="cube3d">
            <span class="tab-icon">🎮</span>
            <span class="tab-label">3D</span>
        </button>
    </nav>

    <!-- ========== 公式大全页 ========== -->
    <main id="page-formulas" class="page active">
        <div class="page-content">
            <!-- 分类选择 -->
            <div class="formula-cats">
                <button class="cat-btn active" data-cat="cross">十字</button>
                <button class="cat-btn" data-cat="f2l">F2L</button>
                <button class="cat-btn" data-cat="oll">OLL</button>
                <button class="cat-btn" data-cat="pll">PLL</button>
                <button class="cat-btn" data-cat="zbll">ZBLL</button>
                <button class="cat-btn" data-cat="zbls">ZBLS</button>
                <button class="cat-btn" data-cat="cross2f2l">十字→F2L</button>
            </div>
            <!-- 搜索栏 -->
            <div class="search-bar">
                <input type="text" id="formula-search" placeholder="🔍 搜索公式...">
            </div>
            <!-- 公式列表 -->
            <div id="formula-list" class="formula-list"></div>
        </div>
    </main>

    <!-- ========== 教程页 ========== -->
    <main id="page-tutorial" class="page">
        <div class="page-content">
            <!-- 步骤导航 -->
            <div class="tutorial-steps-nav" id="tutorial-steps-nav"></div>
            <!-- 教程内容 -->
            <div id="tutorial-content" class="tutorial-content"></div>
        </div>
    </main>

    <!-- ========== 填色还原页 ========== -->
    <main id="page-solver" class="page">
        <div class="page-content">
            <h2 class="section-title">填色还原</h2>
            <p class="section-desc">点击选择颜色，再点击魔方格子填色</p>
            <!-- 颜色选择 -->
            <div class="color-picker" id="color-picker"></div>
            <!-- 2D展开图 -->
            <div class="cube-net" id="cube-net"></div>
            <!-- 操作按钮 -->
            <div class="solver-actions">
                <button class="btn btn-secondary" id="solver-reset">清空重置</button>
                <button class="btn btn-primary" id="solver-solve">开始还原</button>
            </div>
            <!-- 还原步骤 -->
            <div id="solver-result" class="solver-result"></div>
        </div>
    </main>

    <!-- ========== 计时器页 ========== -->
    <main id="page-timer" class="page">
        <div class="page-content timer-page">
            <!-- 打乱公式 -->
            <div class="scramble-display" id="scramble-display"></div>
            <!-- 计时器 -->
            <div class="timer-display" id="timer-display">0.000</div>
            <p class="timer-hint" id="timer-hint">点击屏幕或按空格开始/停止</p>
            <!-- 新打乱按钮 -->
            <button class="btn btn-accent" id="new-scramble">新打乱</button>
            <!-- 统计 -->
            <div class="timer-stats" id="timer-stats"></div>
            <!-- 历史记录 -->
            <div class="timer-history" id="timer-history"></div>
        </div>
    </main>

    <!-- ========== 3D魔方页 ========== -->
    <main id="page-cube3d" class="page">
        <div class="cube3d-controls">
            <div class="order-selector">
                <label>阶数:</label>
                <select id="cube-order">
                    <option value="1">1阶</option>
                    <option value="2">2阶</option>
                    <option value="3" selected>3阶</option>
                    <option value="4">4阶</option>
                    <option value="5">5阶</option>
                    <option value="6">6阶</option>
                    <option value="7">7阶</option>
                    <option value="8">8阶</option>
                    <option value="9">9阶</option>
                    <option value="10">10阶</option>
                    <option value="11">11阶</option>
                    <option value="12">12阶</option>
                </select>
            </div>
            <div class="cube3d-btns">
                <button class="btn btn-sm" id="cube3d-scramble">打乱</button>
                <button class="btn btn-sm" id="cube3d-reset">复位</button>
            </div>
        </div>
        <div class="cube3d-hint">拖拽旋转视角</div>
        <canvas id="cube3d-canvas"></canvas>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="https://cdn.cubing.net/js/cubing/twisty" async></script>
    <script src="js/formulas.js"></script>
    <script src="js/tutorial.js"></script>
    <script src="js/solver.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/cube3d.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
